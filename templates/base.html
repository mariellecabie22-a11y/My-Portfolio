<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding for proper text display -->
    <meta charset="UTF-8">

    <!-- Ensures responsive design on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO description for the website -->
    <meta name="description" content="Portfolio website of Marielle Cabie, showcasing software development projects built using Flask, HTML, CSS, and JavaScript.">

    <!-- Dynamic page title using Jinja template block -->
    <title>{% block title %}Portfolio{% endblock %}</title>

    <!-- Link to external CSS file located in static/css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Favicon icon displayed in browser tab -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
</head>

<body>

    <!-- Header section containing navigation bar -->
    <header>
        <nav class="navbar">

            <!-- Logo / Website Title -->
            <div class="logo">MyPortfolio</div>

            <!-- Navigation links using Flask url_for for dynamic routing -->
            <ul class="nav-links">
                <li><a href="{{ url_for('home') }}">Home</a></li>
                <li><a href="{{ url_for('projects') }}">Projects</a></li>
                <li><a href="{{ url_for('project_details') }}">Project Details</a></li>
                <li><a href="{{ url_for('about') }}">About</a></li>
                <li><a href="{{ url_for('contact') }}">Contact</a></li>
            </ul>

            <!-- Button to toggle light/dark mode (handled by JavaScript) -->
            <button id="theme-toggle" class="btn">🌙</button>

        </nav>
    </header>

    <!-- Main content area where individual pages will be injected -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer section -->
    <footer>
        <p>&copy; 2026 My Portfolio Website</p>
    </footer>

    <!-- Link to external JavaScript file for interactivity -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
