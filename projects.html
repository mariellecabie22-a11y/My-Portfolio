{% extends "base.html" %}

{% block title %}Projects{% endblock %}

{% block content %}
<section class="section">
    <h1>My Projects</h1>

    <div class="filter-buttons">
        <button type="button" onclick="filterProjects('all')">All</button>
        <button type="button" onclick="filterProjects('webdesign')">Web Design</button>
        <button type="button" onclick="filterProjects('JavaScript')">JavaScript</button>
    </div>

    <div class="card-container">
        {% for project in projects %}
        <div class="card {{ project.category }}">
            <h2>{{ project.title }}</h2>
            <p>{{ project.description }}</p>
            <p><strong>Tech Stack:</strong> {{ project.tech }}</p>
            <a href="{{ project.link }}" target="_blank" class="btn">View Project</a>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
